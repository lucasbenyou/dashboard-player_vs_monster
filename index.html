<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mes tâches</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* ── Écran auth ──────────────────────────────── */
    #ecran-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-carte {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .auth-carte h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .auth-onglets {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 24px;
    }

    .auth-onglet {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-onglet.actif {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .auth-champ {
      margin-bottom: 14px;
    }

    .auth-champ label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    .auth-champ input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .auth-champ input:focus { outline: none; border-color: #4f46e5; }

    .auth-erreur {
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 14px;
      min-height: 18px;
      text-align: center;
    }

    /* ── Niveau ───────────────────────────────────── */
    .niveau-carte {
      background: white;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .niveau-badge-grand {
      background: #4f46e5;
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .niveau-barre-wrapper { flex: 1; }

    .niveau-barre-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .niveau-piste {
      background: #e5e7eb;
      border-radius: 100px;
      height: 10px;
      overflow: hidden;
    }

    .niveau-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      transition: width 0.5s ease;
    }

    .niveau-fill.max { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

    /* ── Catégories ───────────────────────────────── */
    .cat-carte {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .cat-titre { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 12px; }

    .cat-grille {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .cat-item {
      background: #f9fafb;
      border-radius: 10px;
      padding: 12px;
    }

    .cat-entete {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .cat-icone { font-size: 18px; }
    .cat-nom   { font-size: 13px; font-weight: 600; color: #374151; }
    .cat-niveau-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      background: #e0e7ff;
      color: #4f46e5;
      padding: 2px 8px;
      border-radius: 100px;
    }

    .cat-piste { background: #e5e7eb; border-radius: 100px; height: 6px; overflow: hidden; margin-bottom: 4px; }
    .cat-fill  { height: 100%; border-radius: 100px; background: #4f46e5; transition: width 0.4s ease; }
    .cat-fill.physique { background: #ef4444; }
    .cat-fill.mental   { background: #8b5cf6; }
    .cat-sous-label { font-size: 11px; color: #9ca3af; }

    /* Badge catégorie sur les tâches */
    .badge-cat {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 100px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge-cat.physique { background: #fee2e2; color: #dc2626; }
    .badge-cat.mental   { background: #ede9fe; color: #7c3aed; }

    /* Sélecteur de catégorie */
    .cat-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .cat-select:focus { outline: none; border-color: #4f46e5; }

    /* ── Compétences ──────────────────────────────── */
    .comp-carte {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .comp-entete {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .comp-titre { font-size: 14px; font-weight: 600; color: #374151; }

    .points-badge {
      font-size: 12px;
      font-weight: 600;
      background: #fef3c7;
      color: #d97706;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .comp-grille {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .stat-icone { font-size: 20px; }
    .stat-nom   { font-size: 11px; color: #6b7280; font-weight: 500; }
    .stat-val   { font-size: 18px; font-weight: 700; color: #1a1a2e; }

    .stat-barre-bg {
      width: 100%;
      height: 5px;
      background: #e5e7eb;
      border-radius: 100px;
      overflow: hidden;
    }

    .stat-barre-fill {
      height: 100%;
      border-radius: 100px;
      background: #4f46e5;
      transition: width 0.4s ease;
    }

    .btn-plus {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: opacity 0.15s;
    }
    .btn-plus:hover { opacity: 0.8; }
    .btn-plus.visible { display: flex; }

    /* ── Écran tâches ─────────────────────────────── */
    #ecran-taches {
      display: none;
      padding: 40px 20px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .entete {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .entete-gauche { display: flex; align-items: center; gap: 12px; }
    h1 { font-size: 24px; color: #1a1a2e; }

    .utilisateur-badge {
      font-size: 13px;
      color: #6b7280;
      background: #e5e7eb;
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ── Boutons ──────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
      width: 100%;
    }
    .btn-inline {
      width: auto;
      padding: 5px 10px;
      font-size: 12px;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary  { background: #4f46e5; color: white; }
    .btn-success  { background: #22c55e; color: white; }
    .btn-danger   { background: #ef4444; color: white; }
    .btn-ghost    { background: #e5e7eb; color: #374151; }
    .btn-deconnexion {
      background: none;
      border: 1px solid #e5e7eb;
      color: #6b7280;
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-deconnexion:hover { background: #f3f4f6; }

    /* ── Formulaire nouvelle tâche ────────────────── */
    .carte {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 20px;
      display: none;
    }
    .carte.visible { display: block; }
    .carte input, .carte textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: inherit;
    }
    .carte textarea { resize: vertical; min-height: 56px; }
    .carte input:focus, .carte textarea:focus { outline: none; border-color: #4f46e5; }
    .carte-actions { display: flex; gap: 8px; }
    .carte-actions .btn { width: auto; }

    /* ── Tâche ────────────────────────────────────── */
    .tache {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-left: 4px solid #4f46e5;
    }
    .tache.niveau-1 { margin-left: 24px; border-left-color: #818cf8; }
    .tache.niveau-2 { margin-left: 48px; border-left-color: #c7d2fe; }
    .tache.terminee { border-left-color: #22c55e; opacity: 0.65; }

    .tache-entete {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .tache-titre { font-weight: 600; font-size: 15px; color: #111827; }
    .tache-titre.barre { text-decoration: line-through; color: #9ca3af; }
    .tache-desc { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .niveau-badge { font-size: 11px; color: #d1d5db; margin-left: 6px; font-weight: 400; }
    .tache-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

    .progression-wrapper { margin-top: 10px; }
    .progression-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .progression-piste { background: #e5e7eb; border-radius: 100px; height: 7px; overflow: hidden; }
    .progression-fill { height: 100%; border-radius: 100px; background: #4f46e5; transition: width 0.4s; }
    .progression-fill.complet { background: #22c55e; }

    .form-sous {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px dashed #d1d5db;
    }
    .form-sous.visible { display: block; }
    .form-sous input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .form-sous input:focus { outline: none; border-color: #4f46e5; }
    .form-sous-actions { display: flex; gap: 6px; }

    .sous-taches { margin-top: 10px; }

    #erreur-taches { color: #ef4444; font-size: 13px; margin-bottom: 12px; min-height: 18px; }
    .vide { text-align: center; color: #9ca3af; font-size: 14px; padding: 40px 0; }
  </style>
</head>
<body>

<!-- ══ ÉCRAN AUTHENTIFICATION ════════════════════════════ -->
<div id="ecran-auth">
  <div class="auth-carte">
    <h2>Mes tâches</h2>

    <div class="auth-onglets">
      <div class="auth-onglet actif" onclick="basculerOnglet('connexion')">Se connecter</div>
      <div class="auth-onglet"      onclick="basculerOnglet('inscription')">S'inscrire</div>
    </div>

    <div class="auth-erreur" id="auth-erreur"></div>

    <!-- Connexion -->
    <div id="form-connexion">
      <div class="auth-champ">
        <label>Nom d'utilisateur</label>
        <input type="text" id="co-nom" placeholder="votre nom"
               onkeydown="if(event.key==='Enter') seConnecter()" />
      </div>
      <div class="auth-champ">
        <label>Mot de passe</label>
        <input type="password" id="co-mdp" placeholder="••••••"
               onkeydown="if(event.key==='Enter') seConnecter()" />
      </div>
      <button class="btn btn-primary" onclick="seConnecter()">Se connecter</button>
    </div>

    <!-- Inscription -->
    <div id="form-inscription" style="display:none">
      <div class="auth-champ">
        <label>Nom d'utilisateur <span style="color:#9ca3af">(min. 3 caractères)</span></label>
        <input type="text" id="in-nom" placeholder="votre nom"
               onkeydown="if(event.key==='Enter') sInscrire()" />
      </div>
      <div class="auth-champ">
        <label>Mot de passe <span style="color:#9ca3af">(min. 6 caractères)</span></label>
        <input type="password" id="in-mdp" placeholder="••••••"
               onkeydown="if(event.key==='Enter') sInscrire()" />
      </div>
      <button class="btn btn-primary" onclick="sInscrire()">Créer un compte</button>
    </div>
  </div>
</div>

<!-- ══ ÉCRAN TÂCHES ═══════════════════════════════════════ -->
<div id="ecran-taches">
  <div class="container">

    <div class="entete">
      <div class="entete-gauche">
        <h1>Mes tâches</h1>
        <span class="utilisateur-badge" id="badge-utilisateur"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-inline" onclick="toggleFormulaire()">+ Nouvelle tâche</button>
        <button class="btn-deconnexion" onclick="seDeconnecter()">Déconnexion</button>
      </div>
    </div>

    <div class="niveau-carte" id="niveau-carte">
      <div class="niveau-badge-grand" id="niveau-texte">Niv. 1</div>
      <div class="niveau-barre-wrapper">
        <div class="niveau-barre-label">
          <span id="niveau-label">0 / 5 tâches</span>
          <span id="niveau-pct">0 %</span>
        </div>
        <div class="niveau-piste">
          <div class="niveau-fill" id="niveau-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="cat-carte">
      <div class="cat-titre">Catégories d'effort</div>
      <div class="cat-grille" id="cat-grille"></div>
    </div>

    <div class="comp-carte">
      <div class="comp-entete">
        <span class="comp-titre">Compétences</span>
        <span class="points-badge" id="points-badge" style="display:none"></span>
      </div>
      <div class="comp-grille">
        <div class="stat-item">
          <div class="stat-icone">⚔</div>
          <div class="stat-nom">Force</div>
          <div class="stat-val" id="val-force">1</div>
          <div class="stat-barre-bg"><div class="stat-barre-fill" id="bar-force" style="width:2%"></div></div>
          <button class="btn-plus" id="btn-force" onclick="ameliorerStat('force')">+</button>
        </div>
        <div class="stat-item">
          <div class="stat-icone">🛡</div>
          <div class="stat-nom">Défense</div>
          <div class="stat-val" id="val-defense">1</div>
          <div class="stat-barre-bg"><div class="stat-barre-fill" id="bar-defense" style="width:2%"></div></div>
          <button class="btn-plus" id="btn-defense" onclick="ameliorerStat('defense')">+</button>
        </div>
        <div class="stat-item">
          <div class="stat-icone">❤</div>
          <div class="stat-nom">Vie</div>
          <div class="stat-val" id="val-vie">1</div>
          <div class="stat-barre-bg"><div class="stat-barre-fill" id="bar-vie" style="width:2%"></div></div>
          <button class="btn-plus" id="btn-vie" onclick="ameliorerStat('vie')">+</button>
        </div>
        <div class="stat-item">
          <div class="stat-icone">✨</div>
          <div class="stat-nom">Magie</div>
          <div class="stat-val" id="val-magie">1</div>
          <div class="stat-barre-bg"><div class="stat-barre-fill" id="bar-magie" style="width:2%"></div></div>
          <button class="btn-plus" id="btn-magie" onclick="ameliorerStat('magie')">+</button>
        </div>
        <div class="stat-item">
          <div class="stat-icone">🧠</div>
          <div class="stat-nom">Intel</div>
          <div class="stat-val" id="val-intel">1</div>
          <div class="stat-barre-bg"><div class="stat-barre-fill" id="bar-intel" style="width:2%"></div></div>
          <button class="btn-plus" id="btn-intel" onclick="ameliorerStat('intel')">+</button>
        </div>
      </div>
    </div>

    <div class="carte" id="formulaire-principal">
      <input  type="text" id="input-titre"       placeholder="Titre *"
              onkeydown="if(event.key==='Enter') ajouterTache()" />
      <textarea            id="input-description" placeholder="Description (optionnelle)"></textarea>
      <select class="cat-select" id="input-categorie">
        <option value="">— Sans catégorie —</option>
        <option value="physique">💪 Effort physique</option>
        <option value="mental">🧠 Effort mental</option>
      </select>
      <div class="carte-actions">
        <button class="btn btn-primary" onclick="ajouterTache()">Ajouter</button>
        <button class="btn btn-ghost"   onclick="toggleFormulaire()">Annuler</button>
      </div>
    </div>

    <div id="erreur-taches"></div>
    <div id="liste-taches"></div>

  </div>
</div>

<script>
  const API = "http://localhost:8000";

  // ── Auth locale ──────────────────────────────────────

  function getToken()  { return localStorage.getItem("token"); }
  function getNom()    { return localStorage.getItem("nom"); }

  function sauvegarderSession(token, nom) {
    localStorage.setItem("token", token);
    localStorage.setItem("nom", nom);
  }

  function effacerSession() {
    localStorage.removeItem("token");
    localStorage.removeItem("nom");
  }

  function headers() {
    return {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${getToken()}`,
    };
  }

  // ── Navigation entre écrans ───────────────────────────

  function afficherEcranAuth()   {
    document.getElementById("ecran-auth").style.display   = "flex";
    document.getElementById("ecran-taches").style.display = "none";
  }

  function afficherEcranTaches() {
    document.getElementById("ecran-auth").style.display   = "none";
    document.getElementById("ecran-taches").style.display = "block";
    document.getElementById("badge-utilisateur").textContent = getNom();
    chargerNiveau();
    chargerCategories();
    chargerCompetences();
    chargerTaches();
  }

  // ── Onglets connexion / inscription ──────────────────

  function basculerOnglet(onglet) {
    document.querySelectorAll(".auth-onglet").forEach((el, i) =>
      el.classList.toggle("actif", (i === 0) === (onglet === "connexion"))
    );
    document.getElementById("form-connexion").style.display  = onglet === "connexion"  ? "block" : "none";
    document.getElementById("form-inscription").style.display = onglet === "inscription" ? "block" : "none";
    document.getElementById("auth-erreur").textContent = "";
  }

  // ── Connexion ─────────────────────────────────────────

  async function seConnecter() {
    const nom = document.getElementById("co-nom").value.trim();
    const mdp = document.getElementById("co-mdp").value;
    if (!nom || !mdp) { authErreur("Remplissez tous les champs."); return; }

    const r = await fetch(`${API}/connexion`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nom, mot_de_passe: mdp }),
    });

    if (!r.ok) { authErreur((await r.json()).detail); return; }

    const data = await r.json();
    sauvegarderSession(data.access_token, nom);
    afficherEcranTaches();
  }

  // ── Inscription ───────────────────────────────────────

  async function sInscrire() {
    const nom = document.getElementById("in-nom").value.trim();
    const mdp = document.getElementById("in-mdp").value;

    const r = await fetch(`${API}/inscription`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nom, mot_de_passe: mdp }),
    });

    if (!r.ok) { authErreur((await r.json()).detail); return; }

    // Connexion automatique après inscription
    document.getElementById("co-nom").value = nom;
    document.getElementById("co-mdp").value = mdp;
    basculerOnglet("connexion");
    authErreur("Compte créé ! Connexion en cours…");
    await seConnecter();
  }

  // ── Déconnexion ───────────────────────────────────────

  function seDeconnecter() {
    effacerSession();
    document.getElementById("co-nom").value = "";
    document.getElementById("co-mdp").value = "";
    afficherEcranAuth();
  }

  function authErreur(msg) {
    document.getElementById("auth-erreur").textContent = msg;
  }

  // ── Catégories ────────────────────────────────────────

  const CAT_LABELS = { physique: "Physique", mental: "Mental" };

  async function chargerCategories() {
    const r = await fetch(`${API}/categories`, { headers: headers() });
    if (!r.ok) return;
    const cats = await r.json();
    const grille = document.getElementById("cat-grille");
    grille.innerHTML = "";
    cats.forEach(c => {
      const label = c.taches_prochain !== null
        ? `${c.taches_niveau} / ${c.taches_prochain} tâches`
        : `${c.taches_niveau} tâches (MAX)`;
      grille.innerHTML += `
        <div class="cat-item">
          <div class="cat-entete">
            <span class="cat-icone">${c.icone}</span>
            <span class="cat-nom">${CAT_LABELS[c.type]}</span>
            <span class="cat-niveau-badge">Niv. ${c.niveau}</span>
          </div>
          <div class="cat-piste">
            <div class="cat-fill ${c.type}" style="width:${c.progression}%"></div>
          </div>
          <div class="cat-sous-label">${label}</div>
        </div>`;
    });
  }

  // ── Compétences ───────────────────────────────────────

  const STATS_META = {
    force:   { label: "Force"   },
    defense: { label: "Défense" },
    vie:     { label: "Vie"     },
    magie:   { label: "Magie"   },
    intel:   { label: "Intel"   },
  };

  async function chargerCompetences() {
    const r = await fetch(`${API}/competences`, { headers: headers() });
    if (!r.ok) return;
    const c = await r.json();
    const aDesPoints = c.points_disponibles > 0;

    const badge = document.getElementById("points-badge");
    badge.style.display = aDesPoints ? "inline" : "none";
    badge.textContent   = `${c.points_disponibles} point${c.points_disponibles > 1 ? "s" : ""} disponible${c.points_disponibles > 1 ? "s" : ""}`;

    const maxStat = Math.max(c.force, c.defense, c.vie, c.magie, c.intel, 10);
    for (const stat of Object.keys(STATS_META)) {
      document.getElementById(`val-${stat}`).textContent = c[stat];
      document.getElementById(`bar-${stat}`).style.width = `${Math.min(c[stat] / maxStat * 100, 100)}%`;
      document.getElementById(`btn-${stat}`).classList.toggle("visible", aDesPoints);
    }
  }

  async function ameliorerStat(stat) {
    const r = await fetch(`${API}/competences/${stat}`, { method: "PATCH", headers: headers() });
    if (!r.ok) { tachesErreur((await r.json()).detail); return; }
    chargerCompetences();
  }

  // ── Niveau ────────────────────────────────────────────

  async function chargerNiveau() {
    const r = await fetch(`${API}/profil`, { headers: headers() });
    if (!r.ok) return;
    const p = await r.json();

    document.getElementById("niveau-texte").textContent =
      p.niveau >= 20 ? "Niv. MAX" : `Niv. ${p.niveau}`;

    const estMax = p.taches_prochain_niveau === null;
    document.getElementById("niveau-label").textContent = estMax
      ? `${p.taches_niveau} tâches complétées`
      : `${p.taches_niveau} / ${p.taches_prochain_niveau} tâches`;

    document.getElementById("niveau-pct").textContent = `${p.progression} %`;
    const fill = document.getElementById("niveau-fill");
    fill.style.width = `${p.progression}%`;
    fill.classList.toggle("max", estMax);
  }

  // ── Chargement des tâches ─────────────────────────────

  async function chargerTaches() {
    const r = await fetch(`${API}/taches`, { headers: headers() });
    if (r.status === 401) { seDeconnecter(); return; }
    const taches = await r.json();
    const conteneur = document.getElementById("liste-taches");
    conteneur.innerHTML = "";
    if (taches.length === 0) {
      conteneur.innerHTML = `<div class="vide">Aucune tâche — cliquez sur "+ Nouvelle tâche"</div>`;
      return;
    }
    taches.forEach(t => conteneur.appendChild(renderTache(t)));
  }

  // ── Rendu récursif ────────────────────────────────────

  function renderTache(t) {
    const estFeuille      = "terminee" in t;
    const terminee        = estFeuille && t.terminee;
    const peutAjouterSous = t.profondeur < 2 && t.sous_taches.length < 5;

    const div = document.createElement("div");
    div.id        = `tache-${t.id}`;
    div.className = `tache niveau-${t.profondeur}${terminee ? " terminee" : ""}`;

    let progressHTML = "";
    if (!estFeuille) {
      const pct = t.progression ?? 0;
      progressHTML = `
        <div class="progression-wrapper">
          <div class="progression-label">Progression : ${pct} %</div>
          <div class="progression-piste">
            <div class="progression-fill${pct === 100 ? " complet" : ""}" style="width:${pct}%"></div>
          </div>
        </div>`;
    }

    const btnTerminer = estFeuille && !terminee
      ? `<button class="btn btn-success btn-inline" onclick="terminerTache(${t.id})">✓ Terminer</button>`
      : "";

    const btnSous = peutAjouterSous && !terminee
      ? `<button class="btn btn-ghost btn-inline" onclick="toggleForm(${t.id})">+ sous-tâche</button>`
      : "";

    const btnSupprimer = !terminee
      ? `<button class="btn btn-danger btn-inline" onclick="supprimerTache(${t.id})">✕</button>`
      : "";

    div.innerHTML = `
      <div class="tache-entete">
        <div>
          <span class="tache-titre${terminee ? " barre" : ""}">${t.titre}</span>
          <span class="niveau-badge">niv. ${t.profondeur}</span>
          ${t.categorie ? `<span class="badge-cat ${t.categorie}">${{physique:"💪",mental:"🧠"}[t.categorie]}</span>` : ""}
          ${t.description ? `<div class="tache-desc">${t.description}</div>` : ""}
        </div>
        <div class="tache-actions">
          ${btnTerminer}
          ${btnSous}
          ${btnSupprimer}
        </div>
      </div>
      ${progressHTML}
      ${peutAjouterSous ? `
        <div class="form-sous" id="form-${t.id}">
          <input type="text" id="titre-sous-${t.id}" placeholder="Titre *"
                 onkeydown="if(event.key==='Enter') ajouterSousTache(${t.id})" />
          <input type="text" id="desc-sous-${t.id}"  placeholder="Description (optionnelle)" />
          <div class="form-sous-actions">
            <button class="btn btn-primary btn-inline" onclick="ajouterSousTache(${t.id})">Ajouter</button>
            <button class="btn btn-ghost   btn-inline" onclick="toggleForm(${t.id})">Annuler</button>
          </div>
        </div>` : ""}
      <div class="sous-taches" id="sous-${t.id}"></div>
    `;

    if (t.sous_taches.length > 0) {
      const zone = div.querySelector(`#sous-${t.id}`);
      t.sous_taches.forEach(st => zone.appendChild(renderTache(st)));
    }

    return div;
  }

  // ── Actions tâches ────────────────────────────────────

  function toggleFormulaire() {
    const f = document.getElementById("formulaire-principal");
    f.classList.toggle("visible");
    if (f.classList.contains("visible"))
      document.getElementById("input-titre").focus();
  }

  function toggleForm(parentId) {
    document.getElementById(`form-${parentId}`).classList.toggle("visible");
  }

  async function ajouterTache() {
    const titre       = document.getElementById("input-titre").value.trim();
    const description = document.getElementById("input-description").value.trim() || null;
    const categorie   = document.getElementById("input-categorie").value || null;
    if (!titre) { tachesErreur("Le titre est obligatoire."); return; }

    const r = await fetch(`${API}/taches`, {
      method: "POST",
      headers: headers(),
      body: JSON.stringify({ titre, description, categorie }),
    });

    if (r.status === 401) { seDeconnecter(); return; }
    if (!r.ok) { tachesErreur((await r.json()).detail); return; }

    document.getElementById("input-titre").value       = "";
    document.getElementById("input-description").value = "";
    document.getElementById("input-categorie").value   = "";
    document.getElementById("formulaire-principal").classList.remove("visible");
    tachesErreur("");
    chargerTaches();
  }

  async function ajouterSousTache(parentId) {
    const titre       = document.getElementById(`titre-sous-${parentId}`).value.trim();
    const description = document.getElementById(`desc-sous-${parentId}`).value.trim() || null;
    if (!titre) return;

    const r = await fetch(`${API}/taches`, {
      method: "POST",
      headers: headers(),
      body: JSON.stringify({ titre, description, parent_id: parentId }),
    });

    if (r.status === 401) { seDeconnecter(); return; }
    if (!r.ok) { tachesErreur((await r.json()).detail); return; }

    tachesErreur("");
    chargerTaches();
  }

  async function terminerTache(id) {
    const r = await fetch(`${API}/taches/${id}/terminer`, { method: "PATCH", headers: headers() });
    if (r.status === 401) { seDeconnecter(); return; }
    if (!r.ok) { tachesErreur((await r.json()).detail); return; }
    chargerNiveau();
    chargerCategories();
    chargerCompetences();
    chargerTaches();
  }

  async function supprimerTache(id) {
    await fetch(`${API}/taches/${id}`, { method: "DELETE", headers: headers() });
    chargerTaches();
  }

  function tachesErreur(msg) {
    document.getElementById("erreur-taches").textContent = msg;
  }

  // ── Initialisation ────────────────────────────────────

  if (getToken()) {
    afficherEcranTaches();
  } else {
    afficherEcranAuth();
  }
</script>
</body>
</html>
